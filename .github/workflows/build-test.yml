name: build-and-test

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  VCPKG_COMMIT: 03e366fb91e38b9432ebd5f8cc79f7c8f55e96ab
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install build tools and Qt system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config autoconf automake libtool \
            libx11-dev libx11-xcb-dev libxext-dev libxrender-dev libxi-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libgl1-mesa-dev libglu1-mesa-dev \
            libxrandr-dev libxcursor-dev libxdamage-dev libxinerama-dev \
            '^libxcb.*-dev'

      - name: Bootstrap pinned vcpkg
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.tmp/vcpkg
        run: |
          rm -rf "${VCPKG_ROOT}"
          mkdir -p "${VCPKG_ROOT}"
          git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
          git -C "${VCPKG_ROOT}" checkout "$VCPKG_COMMIT"
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "$GITHUB_ENV"
          echo "${VCPKG_ROOT}" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake --preset development -DLOCALVAULT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset development --parallel

      - name: Test
        run: ctest --preset development

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Ninja
        run: brew install ninja

      - name: Bootstrap pinned vcpkg
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.tmp/vcpkg
        run: |
          rm -rf "${VCPKG_ROOT}"
          mkdir -p "${VCPKG_ROOT}"
          git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
          git -C "${VCPKG_ROOT}" checkout "$VCPKG_COMMIT"
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "$GITHUB_ENV"
          echo "${VCPKG_ROOT}" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake --preset development -DLOCALVAULT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset development --parallel

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --preset development

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Bootstrap pinned vcpkg
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          if (Test-Path "$env:VCPKG_ROOT") { Remove-Item -Recurse -Force "$env:VCPKG_ROOT" }
          git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          git -C "$env:VCPKG_ROOT" checkout "$env:VCPKG_COMMIT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=$env:VCPKG_ROOT"
          Add-Content $env:GITHUB_PATH "$env:VCPKG_ROOT"

      - name: Configure
        run: cmake --preset windows-development -DLOCALVAULT_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset windows-development-debug --parallel

      - name: Test
        run: ctest --preset windows-development-debug
